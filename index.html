<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vanessa · Vanity by Vanessa</title>
<meta name="description" content="Vanessa — Esthetician & Skincare Specialist. Winter Park, Florida.">
<meta name="theme-color" content="#f4ebe2">
<meta property="og:title" content="Vanity by Vanessa">
<meta property="og:description" content="Esthetician & Skincare Specialist · Winter Park, FL">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4ebe2;
    --bg-deeper: #ecdfd2;
    --paper: #faf4ed;
    --ink: #2a221c;
    --ink-soft: #5c4d40;
    --gold: #b08b4e;
    --gold-deep: #8a6a35;
    --gold-light: #d4af7a;
    --line: rgba(176, 139, 78, 0.22);
    --shadow-card: 0 30px 60px -25px rgba(80, 50, 20, 0.35), 0 8px 24px -12px rgba(80, 50, 20, 0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(ellipse at 15% 5%, rgba(212, 175, 122, 0.22), transparent 50%),
      radial-gradient(ellipse at 85% 95%, rgba(176, 139, 78, 0.18), transparent 55%),
      linear-gradient(180deg, var(--bg) 0%, var(--bg-deeper) 100%);
  }

  /* Subtle paper grain */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.45;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.3  0 0 0 0 0.22  0 0 0 0 0.12  0 0 0 0.06 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    background: var(--paper);
    border-radius: 22px;
    padding: 48px 36px 36px;
    box-shadow: var(--shadow-card);
    border: 1px solid rgba(176, 139, 78, 0.18);
    animation: rise 0.95s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  /* Decorative inner border */
  .card::before {
    content: "";
    position: absolute;
    inset: 12px;
    border: 1px solid var(--line);
    border-radius: 14px;
    pointer-events: none;
  }
  .card > * { position: relative; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(24px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .logo-wrap {
    text-align: center;
    margin-bottom: 8px;
    animation: fadeIn 1.2s 0.2s both;
  }
  .logo-wrap img {
    width: 140px;
    height: auto;
    display: inline-block;
    filter: drop-shadow(0 2px 4px rgba(176, 139, 78, 0.2));
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 12px 0 18px;
  }
  .ornament .line {
    height: 1px;
    width: 32px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .ornament .diamond {
    width: 5px;
    height: 5px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: clamp(48px, 13vw, 58px);
    line-height: 0.95;
    text-align: center;
    color: var(--ink);
    margin-bottom: 4px;
    letter-spacing: -0.015em;
  }
  h1 .by {
    font-style: italic;
    font-weight: 400;
    font-size: 0.7em;
    color: var(--gold-deep);
    margin: 0 -0.02em;
  }

  .title {
    text-align: center;
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }

  .location {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--gold-deep);
    margin-bottom: 30px;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 12px 26px;
    opacity: 0.5;
  }

  .info {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 28px;
  }

  .info-row {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 4px 4px;
    border-radius: 10px;
    text-decoration: none;
    color: inherit;
    transition: background 0.2s ease;
  }
  .info-row:hover {
    background: rgba(176, 139, 78, 0.06);
  }

  .icon {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c9a571, #a07c3f);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--paper);
    box-shadow: 0 2px 6px -2px rgba(140, 100, 50, 0.35);
  }
  .icon svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .info-text {
    flex: 1;
    padding-top: 2px;
  }
  .info-text small {
    display: block;
    font-size: 10px;
    color: var(--gold-deep);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 2px;
    font-weight: 500;
  }
  .info-text span {
    display: block;
    color: var(--ink);
    font-size: 14.5px;
    line-height: 1.4;
    font-weight: 400;
  }
  .info-text .italic {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;
  }

  .actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 4px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 15px 20px;
    border-radius: 14px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 13.5px;
    letter-spacing: 0.06em;
    text-decoration: none;
    transition: transform 0.15s ease, box-shadow 0.25s ease, background 0.2s;
    cursor: pointer;
    border: none;
    -webkit-appearance: none;
    text-transform: uppercase;
  }
  .btn:active { transform: scale(0.98); }

  .btn-primary {
    background: var(--ink);
    color: var(--paper);
    box-shadow: 0 6px 18px -8px rgba(42, 34, 28, 0.5);
  }
  .btn-primary:hover {
    background: #1a1410;
    box-shadow: 0 10px 24px -10px rgba(42, 34, 28, 0.55);
  }

  .btn-secondary {
    background: transparent;
    color: var(--ink);
    border: 1px solid rgba(176, 139, 78, 0.4);
  }
  .btn-secondary:hover {
    background: rgba(176, 139, 78, 0.08);
    border-color: var(--gold);
  }

  .btn svg {
    width: 14px;
    height: 14px;
    stroke-width: 2;
  }

  footer {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 32px;
    opacity: 0.65;
    letter-spacing: 0.02em;
  }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: var(--paper);
    padding: 13px 24px;
    border-radius: 12px;
    font-size: 13.5px;
    font-weight: 500;
    box-shadow: 0 14px 28px -10px rgba(0,0,0,0.4);
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 100;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 380px) {
    .card { padding: 40px 26px 30px; }
    h1 { font-size: 46px; }
    .logo-wrap img { width: 120px; }
  }
</style>
</head>
<body>

  <div class="toast" id="toast">Contact card downloaded</div>

<script>
const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Vanessa
N:;Vanessa;;;
ORG:Vanity by Vanessa
TITLE:Esthetician | Skincare & Wax Specialist
TEL;TYPE=CELL,VOICE:+14074592334
ADR;TYPE=WORK:;;1954 Howell Branch Rd Ste 203;Winter Park;FL;32792;USA
URL:https://www.vagaro.com/theglamourinn
URL;type=Instagram:https://instagram.com/vanityby.vanessa
END:VCARD`;

function downloadVCard() {
  const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Vanessa_VanityByVanessa.vcf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);

  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2400);
}
</script>
